version: '3.8'

services:
  lmpaymentms:
    build: .
    container_name: lmpaymentms
    ports:
      - "8083:8080"  # 
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_APPLICATION_NAME=LibreriaMaketPaymentMS  
      - SERVER_PORT=8080  
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8090/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=false 
      - EUREKA_INSTANCE_HOSTNAME=host.docker.internal 
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/pagos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
    networks:
      - libmark-network

networks:
  libmark-network:
    external: true