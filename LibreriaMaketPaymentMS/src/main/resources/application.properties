spring.application.name=LibreriaMaketPaymentMS

server.port=0

eureka.client.service-url.defaultZone=http://localhost:8090/eureka/
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.prefer-ip-address=true


spring.datasource.url=jdbc:mysql://localhost:3306/payment_db
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


logging.level.root=INFO
logging.level.cl.duoc.libreriaMarketPaymentMS=DEBUG
logging.level.org.hibernate=ERROR

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{50} - %msg%n
logging.file.name=LibreriaMaketPaymentMS.log

//spring.cloud.compatibility-verifier.enabled=false