spring.application.name=LibreriaMaketPaymentMS

server.port=0

# EUREKA (Comentado para evitar que busque el servidor de Eureka local)
# eureka.client.service-url.defaultZone=http://localhost:8090/eureka/
# eureka.instance.instance-id=${spring.application.name}:${random.value}
# eureka.instance.prefer-ip-address=true

# BASE DE DATOS REALES (Comentado para que no busque MySQL en tu máquina)
# spring.datasource.url=jdbc:mysql://localhost:3306/payment_db
# spring.datasource.username=root
# spring.datasource.password=

# BASE DE DATOS DE PRUEBA H2 (Activa temporalmente para trabajar rápido sin Docker)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# FLYWAY (Desactivado para que no busque migraciones en lote mientras testeas)
spring.flyway.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.root=INFO
logging.level.cl.duoc.libreriaMarketPaymentMS=DEBUG
logging.level.org.hibernate=ERROR

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{50} - %msg%n
logging.file.name=LibreriaMaketPaymentMS.log

#spring.cloud.compatibility-verifier.enabled=false
#SWAGGER
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/v1/pagos/v3/api-docs