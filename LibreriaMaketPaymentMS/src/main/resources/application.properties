spring.application.name=LibreriaMaketPaymentMS

# Puerto 0 permite que Spring Boot asigne un puerto libre dinámico (ideal para Docker/Eureka)
server.port=0

# ==========================================
# EUREKA CONFIGURATION (ACTIVO PARA PRODUCCIÓN/DOCKER)
# ==========================================
eureka.client.service-url.defaultZone=http://localhost:8090/eureka/
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.prefer-ip-address=true

# ==========================================
# BASE DE DATOS REAL (CONEXIÓN MYSQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/payment_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ==========================================
# CONFIGURACIÓN JPA / HIERMATE PARA MYSQL
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# FLYWAY (Activado nuevamente para producción si manejan migraciones)
spring.flyway.enabled=true

# ==========================================
# LOGS Y TRAZABILIDAD
# ==========================================
logging.level.root=INFO
logging.level.cl.duoc.libreriaMarketPaymentMS=DEBUG
logging.level.org.hibernate=ERROR

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{50} - %msg%n
logging.file.name=LibreriaMaketPaymentMS.log

# ==========================================
# DOCUMENTACIÓN SWAGGER
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/v1/pagos/v3/api-docs